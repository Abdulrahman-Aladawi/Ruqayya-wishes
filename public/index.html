<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruqayya's Graduation 2026</title>
    <style>
        :root {
            /* Pink to Blue Gradient Colors */
            --pink: #ff9a9e;
            --blue: #a1c4fd;
            --primary-text: #2d3436;
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Pink to Blue Gradient Background */
            background: linear-gradient(135deg, var(--pink) 0%, var(--blue) 100%);
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        .header-img { 
            width: 160px; height: 160px; object-fit: cover;
            margin-bottom: 15px; border-radius: 50%; 
            border: 5px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
        }
        .container { 
            max-width: 500px; width: 100%; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; 
        }
        
        h1 { color: #d63031; margin-bottom: 5px; font-weight: 700; }
        .subtitle { color: #636e72; margin-bottom: 20px; font-size: 14px; }

        /* Countdown Style */
        .countdown-box {
            background: #fff;
            border: 2px dashed var(--pink);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .countdown-text { font-weight: bold; color: #6c5ce7; font-size: 18px; }
        .arabic-text { font-family: 'Amiri', serif; font-size: 20px; display: block; margin-bottom: 5px; }

        input, textarea { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 2px solid #f1f2f6; border-radius: 12px; 
            box-sizing: border-box; font-size: 15px; text-align: center;
        }

        button#submit-btn { 
            width: 100%; background: #6c5ce7; color: white; 
            padding: 16px; border: none; border-radius: 12px; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button#submit-btn:hover { transform: scale(1.02); background: #5849c4; }

        .wishes-grid { width: 100%; max-width: 500px; margin-top: 30px; }
        .wish-card { 
            background: white; padding: 20px; margin-bottom: 15px; 
            border-radius: 15px; border-left: 8px solid var(--pink);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .pinned { border: 2px solid #f1c40f !important; background: #fffdf2; }
    </style>
</head>
<body>

    <img src="graduation_photo.jpeg" alt="Ruqayya" class="header-img">

    <div class="container">
        <h1>Wish Something For Ruqayya Ahmad 🎓</h1>
        <p class="subtitle">Celebrating her success in June 2026</p>
        
        <!-- Countdown above the name box -->
        <div class="countdown-box">
            <span class="arabic-text">The Countdown</span>
            <div id="timer" class="countdown-text">Loading countdown...</div>
            <span style="font-size: 12px; color: #b2bec3;">Days : Hours : Mins : Secs</span>
        </div>

        <input type="text" id="name" placeholder="Your Name ">
        <textarea id="message" rows="3" placeholder="Your Wish "></textarea>
        <button id="submit-btn" onclick="submitWish()">Send Wish ✨ </button>
    </div>

    <div class="wishes-grid" id="wishes-container"></div>

    <script>
        // Set the graduation date
        const graduationDate = new Date("June 03, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = graduationDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `${days}d : ${hours}h : ${minutes}m : ${seconds}s`;

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("timer").innerHTML = "GRADUATED! 🎉 مبروك التخرج";
            }
        }
        const countdownInterval = setInterval(updateCountdown, 1000);
        window.onload = loadWishes;

        async function loadWishes() {
            try {
                const res = await fetch('/api/wishes');
                const wishes = await res.json();
                const container = document.getElementById('wishes-container');
                container.innerHTML = "";
                wishes.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = `wish-card ${wish.is_pinned ? 'pinned' : ''}`;
                    card.innerHTML = `<strong>${wish.name}</strong><p>${wish.message}</p>`;
                    container.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }

        async function submitWish() {
            const name = document.getElementById('name').value;
            const msg = document.getElementById('message').value;
            if(!name || !msg) return alert("Please fill in both fields!");
            
            try {
                const response = await fetch('/api/wishes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, location: "Local", message: msg })
                });
                if (response.ok) {
                    document.getElementById('name').value = "";
                    document.getElementById('message').value = "";
                    loadWishes();
                }
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
