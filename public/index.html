<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruqayya's Graduation 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        
        :root {
    --pink: #ff9a9e;
    --blue: #a1c4fd;
    --primary-text: #2d3436;
}

body { 
    /* Font family cascade: Poppins for English, Cairo for Arabic */
    font-family: 'Poppins', 'Cairo', sans-serif; 
    background: linear-gradient(135deg, var(--pink) 0%, var(--blue) 100%);
    background-attachment: fixed;
    margin: 0; 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100vh;
}

.header-img { 
    width: 160px; height: 160px; object-fit: cover;
    margin-bottom: 15px; border-radius: 50%; 
    border: 5px solid rgba(255, 255, 255, 0.8); 
    box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
}

/* The Frosted Glass Container that matches the background */
.container { 
    max-width: 500px; width: 100%; 
    background: rgba(255, 255, 255, 0.45); /* Semi-transparent white */
    backdrop-filter: blur(10px); /* Frosted glass effect */
    -webkit-backdrop-filter: blur(10px); /* Safari support */
    padding: 30px; 
    border-radius: 25px; 
    border: 1px solid rgba(255, 255, 255, 0.4); /* Subtle shiny border */
    box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
    text-align: center; 
    box-sizing: border-box;
}

h1 { color: #2d3436; margin-bottom: 5px; font-weight: 700; }
.subtitle { color: #57606f; margin-bottom: 20px; font-size: 14px; font-weight: 400; }

/* Premium Glassmorphism Countdown Container */
.countdown-box {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 22px 15px;
    border-radius: 20px;
    margin-bottom: 25px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03), 
                inset 0 1px 2px rgba(255, 255, 255, 0.3);
    transition: transform 0.3s ease;
}

.countdown-box:hover {
    transform: translateY(-2px);
}

/* Beautiful Heading Style */
.arabic-text { 
    font-family: 'Cairo', sans-serif;
    font-weight: 700; 
    font-size: 17px; 
    color: #2d3436;
    display: block; 
    margin-bottom: 12px; 
    letter-spacing: 0.5px;
}

/* Styling the raw JavaScript output text string */
.countdown-text { 
    font-family: 'Poppins', sans-serif;
    font-weight: 700; 
    font-size: 26px; /* Bigger, bolder numbers */
    color: #6c5ce7; /* Sleek graduation purple */
    letter-spacing: 2px; /* Gives the numbers breathing room */
    display: inline-block;
    background: rgba(255, 255, 255, 0.7);
    padding: 8px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
    text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8);
}
button#submit-btn { 
    width: 100%; background: #6c5ce7; color: white; 
    padding: 16px; border: none; border-radius: 12px; 
    font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
    font-family: 'Poppins', 'Cairo', sans-serif;
    box-shadow: 0 8px 15px rgba(108, 92, 231, 0.2);
}
button#submit-btn:hover { transform: scale(1.01); background: #5849c4; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); }

.wishes-grid { width: 100%; max-width: 500px; margin-top: 30px; }

/* Wishing Cards matching the new design standard */
.wish-card { 
    background: rgba(255, 255, 255, 0.85); 
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    padding: 20px; margin-bottom: 15px; 
    border-radius: 15px; border-left: 8px solid var(--pink);
    box-shadow: 0 8px 20px rgba(0,0,0,0.02);
}
.pinned { border: 2px solid #f1c40f !important; background: rgba(255, 253, 242, 0.9); }
    </style>
</head>
<body>

    <img src="graduation_photo.jpeg" alt="Ruqayya" class="header-img">

    <div class="container">
        <h1>Wish Something For Ruqayya Ahmad 🎓</h1>
        <p class="subtitle">Celebrating her success in June 2026</p>
        
        <!-- Countdown above the name box -->
        <div class="countdown-box">
            <span class="arabic-text">The Countdown</span>
            <div id="timer" class="countdown-text">Loading countdown...</div>
            <span style="font-size: 12px; color: #b2bec3;">Days : Hours : Mins : Secs</span>
        </div>

        <input type="text" id="name" placeholder="Your Name ">
        <textarea id="message" rows="3" placeholder="Your Wish "></textarea>
        <button id="submit-btn" onclick="submitWish()">Send Wish ✨ </button>
    </div>

    <div class="wishes-grid" id="wishes-container"></div>

    <script>
        // Set the graduation date
        const graduationDate = new Date("June 03, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = graduationDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `${days}d : ${hours}h : ${minutes}m : ${seconds}s`;

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.getElementById("timer").innerHTML = "GRADUATED! 🎉 مبروك التخرج";
            }
        }
        const countdownInterval = setInterval(updateCountdown, 1000);
        window.onload = loadWishes;

        async function loadWishes() {
            try {
                const res = await fetch('/api/wishes');
                const wishes = await res.json();
                const container = document.getElementById('wishes-container');
                container.innerHTML = "";
                wishes.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = `wish-card ${wish.is_pinned ? 'pinned' : ''}`;
                    card.innerHTML = `<strong>${wish.name}</strong><p>${wish.message}</p>`;
                    container.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }

        async function submitWish() {
            const name = document.getElementById('name').value;
            const msg = document.getElementById('message').value;
            if(!name || !msg) return alert("Please fill in both fields!");
            
            try {
                const response = await fetch('/api/wishes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, location: "Local", message: msg })
                });
                if (response.ok) {
                    document.getElementById('name').value = "";
                    document.getElementById('message').value = "";
                    loadWishes();
                }
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
