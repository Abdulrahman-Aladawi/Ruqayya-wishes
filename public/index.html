<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruqayya's Graduation Wall 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .wish-card { background: #fff; border-left: 5px solid #27ae60; margin: 15px 0; padding: 15px; text-align: left; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .pinned { border-left: 5px solid #f1c40f; background: #fff9e6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎓 Ruqayya's Graduation Wall</h1>
        <p>Leave a wish for the June 2026 Celebration!</p>
        
        <input type="text" id="name" placeholder="Your Name" required>
        <textarea id="message" rows="3" placeholder="Write your wish here..." required></textarea>
        <br>
        <button type="button" id="submit-btn" onclick="submitWish()">Send a Wish</button>

        <hr>
        <div id="wishes-container">
            <!-- Wishes will appear here -->
            <p>Loading wishes...</p>
        </div>
    </div>

    <script>
        // Load wishes immediately when page opens
        window.onload = loadWishes;

        async function loadWishes() {
            try {
                const res = await fetch('/api/wishes');
                const wishes = await res.json();
                const container = document.getElementById('wishes-container');
                container.innerHTML = wishes.length === 0 ? "<p>No wishes yet. Be the first!</p>" : "";

                wishes.forEach(wish => {
                    const card = document.createElement('div');
                    card.className = `wish-card ${wish.is_pinned ? 'pinned' : ''}`;
                    card.innerHTML = `
                        <strong>${wish.name}</strong> <small>(${wish.date})</small>
                        <p>${wish.message}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error loading wishes:", err);
            }
        }

        async function submitWish() {
            const btn = document.getElementById('submit-btn');
            const nameInput = document.getElementById('name');
            const messageInput = document.getElementById('message');

            if (!nameInput.value || !messageInput.value) {
                alert("Please fill in both fields!");
                return;
            }

            // Lock button to prevent issues
            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const response = await fetch('/api/wishes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: nameInput.value, 
                        location: "Visitor", 
                        message: messageInput.value 
                    })
                });

                if (response.ok) {
                    alert("Wish sent successfully!");
                    nameInput.value = "";
                    messageInput.value = "";
                    loadWishes(); // Refresh the list
                } else {
                    const errorText = await response.text();
                    alert("Server Error: " + errorText);
                }
            } catch (err) {
                console.error("Network error:", err);
                alert("Connection failed. Check your database settings.");
            } finally {
                // Re-enable button no matter what
                btn.disabled = false;
                btn.innerText = "Send a Wish";
            }
        }
    </script>
</body>
</html>
